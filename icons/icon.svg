<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f2f5ff"/>
      <stop offset="100%" stop-color="#e4eaf8"/>
    </linearGradient>

    <!-- Purple layer fill -->
    <linearGradient id="g-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Blue layer fill -->
    <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- White card fill -->
    <linearGradient id="g-white" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>

    <!-- Glass specular: top-half only -->
    <linearGradient id="specular" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- ── Background ─────────────────────── -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- ── Shadow blobs (manual, no filter) ─ -->
  <!-- Shadow under purple layer -->
  <ellipse cx="256" cy="480" rx="170" ry="22" fill="rgba(124,58,237,0.14)"/>
  <!-- Shadow under blue layer -->
  <ellipse cx="256" cy="416" rx="195" ry="20" fill="rgba(59,130,246,0.13)"/>
  <!-- Shadow under top card -->
  <ellipse cx="256" cy="332" rx="155" ry="18" fill="rgba(80,100,160,0.11)"/>

  <!-- ── Bottom layer — lavender ──────────── -->
  <rect x="76" y="350" width="360" height="105" rx="20" fill="url(#g-purple)"/>
  <!-- inner specular shine -->
  <rect x="76" y="350" width="360" height="105" rx="20" fill="url(#specular)"/>
  <!-- top-edge bright line -->
  <rect x="76" y="350" width="360" height="2.5" rx="1.25" fill="rgba(255,255,255,0.72)"/>

  <!-- ── Middle layer — sky blue ──────────── -->
  <rect x="52" y="268" width="408" height="115" rx="20" fill="url(#g-blue)"/>
  <!-- inner specular shine -->
  <rect x="52" y="268" width="408" height="115" rx="20" fill="url(#specular)"/>
  <!-- top-edge bright line -->
  <rect x="52" y="268" width="408" height="2.5" rx="1.25" fill="rgba(255,255,255,0.80)"/>

  <!-- ── Top card — frosted white ─────────── -->
  <rect x="96" y="88" width="320" height="220" rx="22" fill="url(#g-white)"/>
  <!-- inner specular shine -->
  <rect x="96" y="88" width="320" height="220" rx="22" fill="url(#specular)" opacity="0.5"/>
  <!-- top-edge crisp white line -->
  <rect x="96" y="88" width="320" height="3" rx="1.5" fill="rgba(255,255,255,1)"/>

  <!-- Content lines -->
  <rect x="144" y="168" width="152" height="13" rx="6.5" fill="rgba(110,135,185,0.36)"/>
  <rect x="144" y="197" width="110" height="13" rx="6.5" fill="rgba(110,135,185,0.26)"/>
</svg>
