<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synto</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header>
    <div class="logo">
      <img src="../icons/logo.png" class="logo-icon" alt="" aria-hidden="true" />
      <span class="logo-text">Synto</span>
    </div>
    <div class="header-actions">
      <button id="btn-help" data-i18n-title="options_nav_help" aria-label="Open Help">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <circle cx="10" cy="10" r="8"/>
          <path d="M7.5 7.5a2.5 2.5 0 0 1 5 0c0 1.5-2.5 2-2.5 3.5"/>
          <circle cx="10" cy="14.5" r="0.6" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="btn-options" data-i18n-title="options_brand_sub" aria-label="Open Settings">&#9881;</button>
    </div>
  </header>

  <!-- Template selector -->
  <div class="template-ui">
    <div id="intent-tabs" class="intent-tabs" role="tablist" aria-label="Template category"></div>
    <div id="template-cards" class="template-cards" role="listbox" aria-label="Select template"></div>
  </div>

  <!-- Error message -->
  <div id="error-msg" class="status-msg error hidden" role="alert"></div>

  <!-- Preview panel -->
  <div id="preview-panel" class="preview-panel hidden">
    <div class="preview-header">

      <!-- Row 1: section label + collapse toggle -->
      <button id="btn-preview-toggle" class="preview-toggle" aria-expanded="true" aria-label="Toggle preview">
        <span class="preview-label" data-i18n="popup_preview">Preview</span>
        <span id="preview-arrow" class="preview-arrow">&#9652;</span>
      </button>

      <!-- Row 2: tabs (primary) + refresh icon + token badge (metadata) -->
      <div class="preview-tab-row">
        <div class="preview-tabs" role="tablist" aria-label="Preview mode">
          <button class="preview-tab active" data-tab="content" role="tab" aria-selected="true" type="button" data-i18n="popup_content_tab">Content</button>
          <button class="preview-tab" data-tab="prompt" role="tab" aria-selected="false" type="button" data-i18n="popup_prompt_tab">Prompt</button>
        </div>
        <div class="preview-row-end">
          <button id="btn-refresh-content" class="preview-refresh-cta" type="button" data-i18n-title="popup_refresh_content_hint" aria-label="Refresh content">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="13" height="13" aria-hidden="true">
              <path d="M13.5 8A5.5 5.5 0 1 1 12.1 4.4"/>
              <polyline points="12.5 2.5 12.5 5.5 9.5 5.5"/>
            </svg>
          </button>
          <span id="refresh-hint" class="refresh-hint" aria-hidden="true"></span>
          <span id="token-count" class="token-count" title="Estimated token count">—</span>
        </div>
      </div>

      <div id="token-warning" class="token-warning hidden" data-i18n="popup_near_limit">Near limit</div>

    </div>

    <div class="preview-wrap">
      <textarea id="preview-text" readonly aria-label="Content preview"></textarea>
      <button id="btn-preview-copy" class="preview-copy-hover" type="button" title="Copy" aria-label="Copy preview text">
        <svg class="icon-copy" width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <svg class="icon-check" width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>

    <div class="preview-footer">
      <button id="btn-copy-md" class="btn-copy-action" disabled>Copy Markdown</button>
    </div>
  </div>

  <!-- Ask AI -->
  <button id="btn-process" class="btn-generate" disabled>Ask AI</button>

  <!-- AI response panel (revealed on first use) -->
  <div id="chat-panel" class="chat-panel hidden">
    <div id="chat-no-key" class="status-msg hidden"><span data-i18n="popup_no_key_prefix">No API key set. Add it in&#160;</span><a id="chat-options-link" href="#" data-i18n="popup_options_link">Options</a><span data-i18n="popup_no_key_suffix">.</span></div>
    <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
    <div id="chat-input-row" class="chat-input-row hidden">
      <textarea id="chat-input" class="chat-input" data-i18n-placeholder="popup_chat_placeholder" placeholder="Ask a follow-up…" rows="1" aria-label="Follow-up message"></textarea>
      <button id="btn-chat-send" class="btn-chat-send" type="button" aria-label="Send message">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="16" x2="10" y2="4"/>
          <polyline points="5 9 10 4 15 9"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
